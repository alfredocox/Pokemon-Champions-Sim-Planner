name: Feature request
description: Suggest a new capability, UI improvement, or quality-of-life change.
title: "[feature] "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to accomplish today that the sim does not support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe what the new feature should do. Include example flows if helpful.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or alternate designs you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, pokepaste links, or source references.
