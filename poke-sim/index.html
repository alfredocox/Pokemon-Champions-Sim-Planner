<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="color-scheme" content="dark light"/>
<meta name="description" content="Poke-e-Sim Champion 2026 — VGC team simulator for April 2026 meta. Test your TR Counter squad against the top metagame teams with Bo1/Bo3/Bo5/Bo10 series."/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Poke-e-Sim"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#22d3ee"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Poke-e-Sim Champion 2026 — VGC Team Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo-block">
      <svg class="logo-icon" width="36" height="36" viewBox="0 0 36 36" fill="none" role="img" aria-label="Champions Sim">
        <title>Champions Sim</title>
        <defs>
          <linearGradient id="hHex" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#67e8f9"/>
            <stop offset="1" stop-color="#0e7490"/>
          </linearGradient>
          <linearGradient id="hBolt" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#a5f3fc"/>
            <stop offset="1" stop-color="#0891b2"/>
          </linearGradient>
        </defs>
        <polygon points="18,2 32,10 32,26 18,34 4,26 4,10" fill="#0b1f2e" stroke="url(#hHex)" stroke-width="2" stroke-linejoin="round"/>
        <polyline points="4,26 18,34 32,26" fill="none" stroke="#ef4444" stroke-width="1" stroke-linejoin="round" opacity="0.85"/>
        <ellipse cx="18" cy="20" rx="9" ry="2.6" fill="none" stroke="#22d3ee" stroke-width="0.9" opacity="0.85"/>
        <ellipse cx="18" cy="20" rx="6" ry="1.6" fill="none" stroke="#67e8f9" stroke-width="0.6" opacity="0.6"/>
        <path d="M 21 6 L 16.5 16 L 19.5 16 L 15.5 28 L 21.5 15.5 L 18.5 15.5 L 22 6 Z" fill="url(#hBolt)" stroke="#ecfeff" stroke-width="0.5" stroke-linejoin="round"/>
      </svg>
      <div>
        <h1 class="site-title">Poke-e-Sim Champion 2026 <span class="build-version" id="build-version" title="Build version - bumps on every commit so you can confirm which build you are testing">v2.1.9-phase4c.1</span></h1>
        <p class="site-sub">April 2026 Meta · VGC Doubles Simulator</p>
      </div>
    </div>
    <div class="header-right">
      <div class="format-toggle" role="group" aria-label="Battle format">
        <button class="fmt-btn active" data-fmt="doubles" id="fmt-doubles">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="8" cy="12" r="3"/><circle cx="16" cy="12" r="3"/></svg>
          Doubles
        </button>
        <button class="fmt-btn" data-fmt="singles" id="fmt-singles">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>
          Singles
        </button>
      </div>
      <button class="btn-icon" data-theme-toggle aria-label="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- FORMAT BANNER -->
<div class="format-banner">
  <div class="format-banner-inner">
    <span class="fmt-indicator" id="fmt-indicator">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="8" cy="12" r="3"/><circle cx="16" cy="12" r="3"/></svg>
      DOUBLES · 4v4 · Spread moves active
    </span>
    <span class="fmt-div">·</span>
    <span class="fmt-source">Sources: <a href="https://pokepast.es" target="_blank" class="fmt-link">pokepast.es</a> · <a href="https://www.smogon.com/dex/sv/formats/vgc2026/" target="_blank" class="fmt-link">Smogon VGC 2026</a></span>
    <span class="fmt-div">·</span>
    <button class="fmt-pill-btn" id="open-import-modal">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Import Team
    </button>
  </div>
</div>

<!-- TABS -->
<nav class="tab-nav" role="tablist">
  <button class="tab-btn active" role="tab" data-tab="simulator">Simulator</button>
  <button class="tab-btn" role="tab" data-tab="teams">Teams</button>
  <button class="tab-btn" role="tab" data-tab="editor">Set Editor</button>
  <button class="tab-btn" role="tab" data-tab="strategy">Strategy</button>
  <button class="tab-btn" role="tab" data-tab="replays">Replay Log</button>
  <button class="tab-btn" role="tab" data-tab="sources">Sources</button>
  <button class="tab-btn" role="tab" data-tab="pilot">Pilot Guide</button>
</nav>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('[SW] Registered:', reg.scope);
    }).catch(err => console.warn('[SW] Registration failed:', err));
  });
}
</script>
</body>
</html>
